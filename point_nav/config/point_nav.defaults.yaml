# Point-Nav default parameters (ROS 2 YAML)
# Keep this file ROS-params-compatible (no top-level custom sequences/maps).

point_nav:
  ros__parameters:
    # --- Navigation core ---
    goal_tolerance: 0.2
    max_linear_speed: 0.4
    max_angular_speed: 0.5
    k_v: 0.5
    k_w: 0.8
    angle_slowdown_threshold: 0.3
    allow_reverse: true

    # --- Joy output shaping ---
    forward_axis_scale: 0.5
    backward_axis_scale: 0.5
    steer_axis_scale: 0.7
    status_log_period: 1.0

    # --- Turning behavior ---
    # Force movement first, then start steering while continuing motion.
    min_moving_speed: 0.08
    initial_forward_motion_time: 0.35

    # --- Combined camera + wheel odometry ---
    # In normal operation, run EKF and consume /odometry/filtered.
    use_ekf_odom: true
    ekf_odom_topic: /odometry/filtered

    # Fallback mode (used only when use_ekf_odom is false)
    use_combined_odom: true
    camera_pose_timeout: 0.5
    camera_pose_topic: /zed/zed_node/pose
    wheel_odom_topic: /wheel/odom

    # --- Goal input topics ---
    goal_override_topic: /goal_point
    goal_add_topic: /goal_point/add

    # --- E-stop ---
    estop_topic: /point_nav/estop

    # --- Throttle controls ---
    # Global multiplier for all runs (0.05..1.0). You can still set one-off per-goal throttle.
    global_throttle_scale: 1.0

    # --- File-based goal input ---
    # Launch injects this YAML file path as `goal_file_path` automatically.
    load_goals_on_startup: false
    goal_file_mode: queue  # queue | override
