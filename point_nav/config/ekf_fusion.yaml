ekf_filter_node:
  ros__parameters:
    # For multi-camera setups, follow Stereolabs guidance and disable camera TF publishing
    # in each ZED node when using an external filter (EKF) to avoid TF conflicts.
    # Example in ZED params:
    #   pos_tracking:
    #     publish_tf: false

    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry (from point_nav wheel_odom_node)
    odom0: /wheel/odom
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Use wheel linear velocity as a robust short-term motion source.
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  false, false,
      false, false, false,
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # # Camera odometry from ZED (adjust this topic if your camera odom topic differs)
    # odom1: /zed/zed_node/odom
    # # Fuse pose (x,y,yaw) and planar velocity (vx,vy,vyaw) from camera odom.
    # odom1_config: [
    #   true,  true,  false,
    #   false, false, true,
    #   true,  true,  false,
    #   false, false, true,
    #   false, false, false
    # ]
    # odom1_differential: false
    # odom1_relative: false
    # odom1_queue_size: 10
    
    odom1: /zed_right/zed_node/odom
    odom1_config: [
      true,  true,  false,
      false, false, true,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10

    # Additional camera odometry feeds (left/right)
    odom2: /zed_left/zed_node/odom
    odom2_config: [
      true,  true,  false,
      false, false, true,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]
    odom2_differential: false
    odom2_relative: false
    odom2_queue_size: 10

